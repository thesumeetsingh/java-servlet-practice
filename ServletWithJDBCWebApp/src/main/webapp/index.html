<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="style.css">
</head>
<body>


<div class="sign-up-box">
	<h1 id="signup-header">Enter your Details</h1>
	<form method="post" action="firstServlet" id="signup-form">
		<label for="firstname" class="prompt">Enter First Name</label>
		<input type="text" name="firstname" class="userentry">
		<br>
		<label for="lastname" class="prompt">Enter Last Name</label>
		<input type="text" name="lastname" class="userentry">
		<br>
		<label for="username" class="prompt">Enter User Name</label>
		<input type="text" name="username" class="userentry">
		<br>
		<label for="city" class="prompt">Enter your city</label>
		<input type="text" name="city" class="userentry">
		<label for="email" class="prompt">Enter your email address</label>
		<input type="text" name="email" class="userentry">
		<label for="phone" class="prompt">Enter your phone number</label>
		<input type="number" name="phone" class="userentry">
		<label for="password" class="prompt">Enter your password</label>
		<input type="password" name="password" class="userentry">
		<br>
		
		<button type="submit" id="signup-button">Sign UP</button>
	</form>
</div>
</body>
</html>
